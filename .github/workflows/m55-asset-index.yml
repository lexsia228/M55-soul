name: m55-asset-index

on:
  workflow_dispatch:
  schedule:
    - cron: '15 21 * * *'

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build asset index
        run: python scripts/m55/build_asset_index.py

      - name: Commit index if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audit/M55_REPO_ASSET_INDEX.md docs/audit/M55_REPO_ASSET_INDEX.json || true
          git diff --cached --quiet || git commit -m "chore(audit): refresh repo asset index"
          git push || true
