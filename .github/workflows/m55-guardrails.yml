name: m55-guardrails

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run guardrails
        run: python scripts/m55/verify_guardrails.py
